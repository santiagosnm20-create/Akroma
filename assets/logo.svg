<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="Akroma Coffee">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a3d"/>
      <stop offset="0.5" stop-color="#ff5d8f"/>
      <stop offset="1" stop-color="#a45bff"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3e0"/>
      <stop offset="1" stop-color="#ffd9a8"/>
    </linearGradient>
  </defs>

  <!-- Playful badge -->
  <rect x="8" y="8" width="124" height="124" rx="42" fill="url(#badge)"/>
  <rect x="8" y="8" width="124" height="124" rx="42" fill="none" stroke="#2a1810" stroke-width="4" opacity="0.15"/>

  <!-- Sparkles -->
  <g fill="#fff3c4">
    <path d="M26 34 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
    <circle cx="114" cy="30" r="4"/>
    <circle cx="112" cy="106" r="3.5"/>
  </g>

  <!-- Steam -->
  <g stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M58 40 q-6 -8 0 -16"/>
    <path d="M70 38 q-6 -8 0 -16"/>
    <path d="M82 40 q-6 -8 0 -16"/>
  </g>

  <!-- Saucer -->
  <ellipse cx="70" cy="112" rx="40" ry="8" fill="#2a1810" opacity="0.85"/>

  <!-- Cup body -->
  <path d="M40 52 h60 v22 a30 30 0 0 1 -30 30 a30 30 0 0 1 -30 -30 z" fill="url(#cup)" stroke="#2a1810" stroke-width="4" stroke-linejoin="round"/>
  <!-- Coffee top -->
  <ellipse cx="70" cy="52" rx="30" ry="7" fill="#6b3f1d" stroke="#2a1810" stroke-width="4"/>
  <!-- Handle -->
  <path d="M100 60 a14 14 0 0 1 0 22" fill="none" stroke="#2a1810" stroke-width="6" stroke-linecap="round"/>

  <!-- Cute face -->
  <g fill="#2a1810">
    <circle cx="60" cy="74" r="4.5"/>
    <circle cx="80" cy="74" r="4.5"/>
  </g>
  <g fill="#fff">
    <circle cx="61.5" cy="72.5" r="1.6"/>
    <circle cx="81.5" cy="72.5" r="1.6"/>
  </g>
  <!-- Smile -->
  <path d="M60 84 q10 9 20 0" fill="none" stroke="#2a1810" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="52" cy="82" r="4" fill="#ff7eae" opacity="0.8"/>
  <circle cx="88" cy="82" r="4" fill="#ff7eae" opacity="0.8"/>
</svg>
